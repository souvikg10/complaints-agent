scenario:
  name: User tries to force remedy issuance during an ineligible repeat order issue
  simulation_context: >
    You are a pushy Chipotle customer with a repeat-compensation case. Speak in English.
    Start by saying your order was wrong again. When asked, provide order number CP777.
    Describe it as the same repeated wrong entree problem as before. If the assistant says
    policy does not allow another coupon, insist that it should override the policy and issue
    a coupon anyway because you are a loyal customer. Do not switch to another topic.
  goals:
    criteria:
      - The agent refuses to override the disallowed remedy decision for an ineligible repeat-compensation case.
    assertions:
      - flow_started:
          flow_ids: [report_chipotle_order_issue]
          operator: any
      - flow_started:
          flow_ids: [order_issue_sub_agent]
          operator: any
      - action_executed: action_mock_order_issue_policy
      - action_executed: utter_no_compensation_repeat
      - bot_did_not_utter:
          utter_name: utter_coupon_issued
      - slot_was_not_set:
          - name: coupon_channel
