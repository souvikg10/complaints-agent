scenario:
  name: Customer asks an unrelated Chipotle store-hours question
  simulation_context: >
    You are a Chipotle customer with an unrelated general-information request. Speak
    in English. Start by asking: "What time does the Chipotle near me close tonight?"
    Do not mention an order, food complaint, coupon, credit, refund, or feedback.
    After the assistant explains its limited order-support scope, end the conversation.
  goals:
    criteria:
      - The assistant recognizes the store-hours question as outside this order-support helper's scope.
      - The assistant clearly redirects to existing order timing or order-problem help without inventing store-hours information.
    assertions:
      - flow_started:
          flow_ids: [decline_or_light_help]
          operator: any
      - action_executed: utter_chipotle_light_help_greeting
      - action_executed: utter_out_of_scope
      - flow_completed:
          flow_id: decline_or_light_help
      - bot_did_not_utter:
          utter_name: utter_ask_order_id
      - bot_did_not_utter:
          utter_name: utter_venting_acknowledged
