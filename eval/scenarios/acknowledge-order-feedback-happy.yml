scenario:
  name: Customer vents, declines action, then closes a feedback-only exchange
  simulation_context: >
    You are a disappointed Chipotle customer who only wants to vent about a bad meal experience
    and does not want any action taken. Speak in English. In your first message, make it clear
    that the food was disappointing but you do not want a refund, coupon, status check,
    replacement, order report, or follow-up. The assistant should acknowledge the feedback and
    end that feedback-only flow naturally. On your next message, say exactly: "No, that's it."
    This is a clear farewell, not a new request. Do not provide an order number, ask for support,
    or switch topics.
  goals:
    criteria:
      - The agent recognizes feedback-only intent rather than opening order-status or order-issue handling.
      - The acknowledgement completes naturally on the first turn without a required farewell prompt.
      - The later farewell starts close_feedback_only, clears feedback_only_active, and sends one concise terminal close.
    assertions:
      - flow_started:
          flow_ids: [acknowledge_order_feedback]
          operator: any
      - flow_started:
          flow_ids: [close_feedback_only]
          operator: any
      - action_executed: utter_venting_acknowledged
      - action_executed: utter_feedback_closed
      - slot_was_set:
          - name: feedback_only_active
            value: false
      - bot_did_not_utter:
          utter_name: utter_ask_order_id
      - bot_did_not_utter:
          utter_name: utter_offer_discount
      - bot_did_not_utter:
          utter_name: utter_offer_credit
      - bot_did_not_utter:
          utter_name: utter_ask_wants_action
      - bot_did_not_utter:
          utter_name: utter_ask_feedback_close_signal
      - flow_completed:
          flow_id: close_feedback_only
