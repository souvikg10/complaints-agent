<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chipotle Order Helper</title>
<style>
:root{--pepper:#A81612;--cream:#FFF3D7;--cilantro:#2E7D32;--bean:#2B2118;--foil:#D9D4C8;--salsa:#F26A21;--white:#fff}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 15% 15%,#fff 0 3%,transparent 3.3%),var(--cream);color:var(--bean);font:16px/1.45 Arial,sans-serif}.widget{width:min(100%,430px);overflow:hidden;border:1px solid #b9ad99;border-radius:24px;background:var(--white);box-shadow:0 18px 48px #2b211838}.foil{height:13px;background:repeating-linear-gradient(105deg,var(--foil) 0 7px,#f4f1e9 7px 10px,#c4beb1 10px 13px)}header{padding:22px 22px 16px;background:var(--pepper);color:#fff}h1{margin:0;font:800 25px/1.05 Impact,Arial,sans-serif;letter-spacing:.4px}.badge{display:inline-block;margin-bottom:10px;padding:5px 9px;border-radius:99px;background:var(--salsa);font-weight:700;font-size:12px}header p{margin:9px 0 0}.chat{padding:18px}.messages{display:grid;gap:10px;max-height:310px;overflow:auto;padding:1px 2px 8px}.message{max-width:92%;padding:12px 14px;border-radius:5px 16px 16px;background:var(--cream)}.message.user{justify-self:end;border-radius:16px 5px 16px 16px;background:var(--cilantro);color:#fff}.actions{display:grid;gap:9px;margin:14px 0}.action{border:1px solid var(--pepper);border-radius:10px;background:#fff;color:var(--pepper);padding:11px;text-align:left;font:700 14px Arial,sans-serif;cursor:pointer}.action:hover{background:#fff4f2}.action:focus-visible,.send:focus-visible,input:focus-visible{outline:3px solid var(--cilantro);outline-offset:2px}.composer{display:flex;gap:8px;border-top:1px solid var(--foil);padding-top:14px}input{width:100%;border:1px solid #897d70;border-radius:9px;padding:11px;font:inherit}.send{border:0;border-radius:9px;background:var(--cilantro);color:#fff;padding:0 14px;font-weight:700;cursor:pointer}.status{min-height:20px;margin:10px 0 0;color:#66594c;font-size:13px}@media(max-width:480px){body{padding:0}.widget{min-height:100vh;border-radius:0}.chat{padding:20px}.messages{max-height:calc(100vh - 350px)}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
</style>
</head>
<body>
<main class="widget" aria-label="Chipotle customer support chat">
  <div class="foil"></div><header><span class="badge">ORDER SUPPORT</span><h1>Chipotle order helper</h1><p>Quick help when you’re hungry—or when your meal missed the mark.</p></header>
  <section class="chat" aria-label="Chat"><div class="messages" id="messages" aria-live="polite"><div class="message">Hi, I’m your Chipotle order helper. I can check when your order will be ready or help fix something that went wrong.</div></div>
  <div class="actions" aria-label="Suggested actions"><button class="action" type="button">Check my order time</button><button class="action" type="button">I got the wrong order</button><button class="action" type="button">My food quality was poor</button><button class="action" type="button">I’m missing an item</button></div>
  <form class="composer" id="composer"><input id="message" aria-label="Your message" placeholder="Tell me what you need…" autocomplete="off"><button class="send" type="submit">Send</button></form><p class="status" id="status">Choose an option or type a message to begin.</p></section>
</main>
<script>
const endpoint=new URL('/webhooks/rest/webhook',window.location.origin).toString();
const sender='chipotle-widget-'+(localStorage.chipotleSender||(localStorage.chipotleSender=crypto.randomUUID()));
const input=document.querySelector('#message'),messages=document.querySelector('#messages'),status=document.querySelector('#status'),form=document.querySelector('#composer');
function add(text,kind='bot'){const el=document.createElement('div');el.className='message '+kind;el.textContent=text;messages.append(el);messages.scrollTop=messages.scrollHeight}
async function send(text){text=text.trim();if(!text)return;add(text,'user');input.value='';status.textContent='Checking that for you…';try{const response=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender,message:text})});if(!response.ok)throw new Error('network');const replies=await response.json();if(!replies.length){status.textContent='I couldn’t find that order yet — check the number and I’ll try again.';return}replies.forEach(reply=>add(reply.text||'I’m here to help with your order.'));status.textContent=''}catch(error){status.textContent='I couldn’t reach the order helper right now. Check your connection and try again.'}}
form.addEventListener('submit',event=>{event.preventDefault();send(input.value)});document.querySelectorAll('.action').forEach(button=>button.addEventListener('click',()=>send(button.textContent)));
</script>
</body>
</html>
