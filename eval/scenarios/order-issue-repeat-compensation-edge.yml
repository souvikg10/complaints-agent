scenario:
  name: Customer hits repeat-compensation policy path for an order issue
  simulation_context: >
    You are a frustrated but cooperative Chipotle customer reporting another issue
    after already receiving compensation recently. Speak in English. Start by saying
    your order was wrong again. When asked, provide order number CP777. Describe it as
    a repeated wrong entree problem. If the assistant denies compensation because of prior
    recent compensation, do not argue further.
  goals:
    criteria:
      - The agent applies the policy result and does not proceed to issue a new coupon when compensation is disallowed.
    assertions:
      - flow_started:
          flow_ids: [report_chipotle_order_issue]
          operator: any
      - flow_started:
          flow_ids: [order_issue_sub_agent]
          operator: any
      - action_executed: action_mock_order_issue_policy
      - action_executed: utter_no_compensation_repeat
      - flow_cancelled:
          flow_id: confirm_issue_resolution
      - slot_was_not_set:
          - name: coupon_channel
      - flow_completed:
          flow_id: report_chipotle_order_issue
