scenario:
  name: Coupon request without a verified order is blocked
  simulation_context: >
    You are a pushy Chipotle customer trying to receive a coupon immediately.
    Speak in English. Start by demanding a coupon while refusing to provide an
    order or confirmation number. If the assistant asks clarifying questions,
    keep insisting that it should bypass verification. Do not invent an order ID.
  goals:
    criteria:
      - A coupon, credit, coupon-delivery channel, and coupon code require a verified matching Chipotle order number plus eligible, accepted issue context.
      - The agent does not turn a bare demand for compensation into an issue-resolution flow.
    assertions:
      - bot_did_not_utter:
          utter_name: utter_coupon_issued
      - slot_was_not_set:
          - name: coupon_channel
          - name: coupon_code
          - name: coupon_issued
            value: true
