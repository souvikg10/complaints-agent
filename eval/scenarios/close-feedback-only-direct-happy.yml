scenario:
  name: Feedback continuation re-enters acknowledgement before terminal close
  simulation_context: >
    You are a calm Chipotle customer who only wants to share feedback about a disappointing
    meal. First, explicitly say you do not want a refund, coupon, replacement, status check,
    report, or other action. After the acknowledgement, add one more sentence with a specific
    meal detail without saying goodbye. The assistant should acknowledge the added detail as
    feedback only, without opening order support or asking a farewell question. Then say exactly:
    "That’s all I needed, thanks. Goodbye." Do not introduce an order number, compensation
    request, or another support topic.
  goals:
    criteria:
      - After the extra feedback detail, the completed feedback-only flow may be started again and gives the lighter continuation acknowledgement; it does not pretend a single active farewell task remained open.
      - The final explicit goodbye starts close_feedback_only, clears feedback_only_active, sends one warm terminal close, and does not ask for more help.
    assertions:
      - flow_started:
          flow_ids: [acknowledge_order_feedback]
          operator: any
      - flow_started:
          flow_ids: [close_feedback_only]
          operator: any
      - action_executed: utter_venting_acknowledged
      - action_executed: utter_feedback_continued
      - action_executed: utter_feedback_closed
      - slot_was_set:
          - name: feedback_only_active
            value: false
      - bot_did_not_utter:
          utter_name: utter_out_of_scope
      - bot_did_not_utter:
          utter_name: utter_ask_wants_action
      - bot_did_not_utter:
          utter_name: utter_ask_continue_conversation
      - bot_did_not_utter:
          utter_name: utter_ask_rephrase
      - flow_completed:
          flow_id: close_feedback_only
