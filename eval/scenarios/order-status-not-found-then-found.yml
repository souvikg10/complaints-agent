scenario:
  name: Customer corrects a documented mock not-found identifier and gets status
  simulation_context: >
    You are a cooperative Chipotle customer checking an order status. Speak in English.
    Start by asking where your order is. When asked for an order number, first provide
    MOCK-NOTFOUND. This is the documented deterministic mock identifier that must return
    not found. After the assistant asks you to verify it, provide CP999, which is a found
    delayed mock order. Your goal is to complete the retry path and receive the updated status.
  goals:
    criteria:
      - The first lookup uses the documented deterministic not-found fixture, so the assistant asks once for corrected details.
      - The corrected identifier completes a second lookup and returns an order status rather than leaving the customer in a retry loop.
    assertions:
      - flow_started:
          flow_ids: [check_chipotle_order_status]
          operator: any
      - flow_started:
          flow_ids: [order_status_sub_agent]
          operator: any
      - action_executed: utter_order_not_found
      - action_executed: utter_ask_order_id
      - sequencing:
          - action_executed: utter_order_not_found
          - action_executed: utter_ask_order_id
          - action_executed: action_mock_order_status
      - flow_completed:
          flow_id: check_chipotle_order_status
